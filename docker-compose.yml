version: "3.9"

services:

  python-backend:
    build:
      context: ./artifacts/python-backend
    container_name: python-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHON_API_PORT=8000

  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: api-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHON_API_PORT=8000
      - PYTHON_API_HOST=python-backend
      - ML_SERVICE_HOST=ml-service
      - ML_SERVICE_PORT=8001
    depends_on:
      - python-backend

  frontend:
    build:
      context: .
      dockerfile: artifacts/energy-researcher/Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-server