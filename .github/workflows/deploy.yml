name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Python Backend
        run: |
         docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/energy-python-backend:latest \
          -f artifacts/python-backend/Dockerfile \
          artifacts/python-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/energy-python-backend:latest

      - name: Build & Push Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/energy-frontend:latest \
            -f artifacts/energy-researcher/Dockerfile \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/energy-frontend:latest

      - name: Build & Push API Server
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/energy-api-server:latest \
            -f artifacts/api-server/Dockerfile \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/energy-api-server:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            set -e
            cd ~

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/energy-python-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/energy-api-server:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/energy-frontend:latest

            docker-compose down
            docker-compose up -d --remove-orphans

            # ✅ SAFE CLEANUP (after containers are running)
            docker image prune -af