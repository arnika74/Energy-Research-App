kind = "web"
previewPath = "/"
title = "Autonomous Energy Researcher Agent"
version = "1.0.0"
id = "artifacts/energy-researcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19334

[services.development]
run = "pnpm --filter @workspace/energy-researcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/energy-researcher", "run", "build" ]
publicDir = "artifacts/energy-researcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19334"
BASE_PATH = "/"
