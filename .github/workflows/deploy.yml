name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/energy-frontend ./artifacts/energy-researcher
          docker push ${{ secrets.DOCKER_USERNAME }}/energy-frontend

      - name: Build & Push API Server
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/energy-api-server ./artifacts/api-server
          docker push ${{ secrets.DOCKER_USERNAME }}/energy-api-server

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            docker pull ${{ secrets.DOCKER_USERNAME }}/energy-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/energy-api-server
            docker-compose down
            docker-compose up -d
